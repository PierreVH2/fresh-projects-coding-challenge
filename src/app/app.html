<div class="app-container" [class.side-by-side]="sideBySide()">
  <div class="floor-plan-container">
    <app-floor-plan
      [image]="houseFloorPlan()"
      [regions]="houseRegions()"
      (roomClick)="handleRoomClick($event)"
    ></app-floor-plan>
  </div>
  <div class="image-gallery-container">
    <div class="image-gallery-toolbar">
      <div class="image-gallery-heading">{{ activeRoomName() | titlecase }}</div>
      <label class="autoscroll-toggle">
        <input type="checkbox" [checked]="autoScroll()" (change)="autoScroll.set($any($event.target).checked)" />
        Auto-scroll
      </label>
    </div>
    <app-image-gallery
      [orientation]="sideBySide() ? 'vertical' : 'horizontal'"
      [autoScrollPxPerFrame]="autoScroll() ? scrollSpeed : 0"
      (scrollEnd)="handleScrollEnd()"
    ></app-image-gallery>
  </div>
</div>
