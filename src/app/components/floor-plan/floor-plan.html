<div class="floor-plan">
  <img [src]="image()" alt="Floor plan" />
  <svg>
    @for (item of regionsArray() | keyvalue; track item.key) {
      <polygon
        [attr.points]="item.value"
        [attr.data-room]="item.key"
        (click)="roomClick.emit(item.key)"
        (mouseenter)="onMouseRoomEnter(item.key)"
        (mouseleave)="onMouseRoomLeave()"
      />
    }
  </svg>
</div>
